modules:
  trigger:
    - key: issue-created
      function: issueCreatedHandler
      events:
        - avi:jira:created:issue

  consumer:
    - key: email-worker
      queue: email-queue
      function: emailHandler

  webtrigger:
    - key: api
      function: apiHandler

    - key: init-db
      function: initDbHandler

  scheduledTrigger:
    - key: cron-job
      function: cronHandler
      interval: hour

  function:
    - key: issueCreatedHandler
      handler: index.issueCreated

    - key: emailHandler
      handler: index.emailWorker

    - key: apiHandler
      handler: index.syncApi

    - key: cronHandler
      handler: index.retryJob

    - key: initDbHandler
      handler: index.initDb

  sql:
    - key: main-db
      engine: mysql

permissions:
  scopes:
    - read:jira-work
    - write:jira-work

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/235415c1-2ca5-4ae3-a586-fd2f5adb91eb
